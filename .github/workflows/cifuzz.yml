name: CIFuzz
on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    steps:
    - name: Build Fuzzers
      id: build
      uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@7dbf92d52804f4160e28ae3eddc5d4d2511cf233
      with:
        oss-fuzz-project-name: 'rustls'
        dry-run: false
        language: rust
    - name: Run Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@7dbf92d52804f4160e28ae3eddc5d4d2511cf233
      with:
        oss-fuzz-project-name: 'rustls'
        fuzz-seconds: 150
        dry-run: false
        language: rust
    - name: Upload Crash
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      if: failure() && steps.build.outcome == 'success'
      with:
        name: artifacts
        path: ./out/artifacts
